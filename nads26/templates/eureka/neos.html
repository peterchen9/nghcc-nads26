{% extends "base.html" %}

{% block title %}新增人員 | {{ site_name }}{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    .eureka-workspace-wrapper {
        background-color: #f1f5f9;
        color: #0f172a;
        padding: 24px;
        border-radius: 16px;
        min-height: 85vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .form-card {
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        max-width: 650px;
        margin: 0 auto;
    }

    .form-label {
        font-weight: 600;
        color: #475569;
        font-size: 0.88rem;
    }

    .form-control:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
    }
</style>
{% endblock %}

{% block content %}
<div class="eureka-workspace-wrapper">
    <div class="form-card">
        <h4 class="fw-bold mb-4 text-dark d-flex align-items-center">
            <i class="bi bi-person-plus-fill text-success me-2"></i>新增人員資料
        </h4>
        
        <form method="post" action="{% url 'eureka:eureka-neos' %}">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="church_id">Church ID (必填且唯一)</label>
                    <input type="number" name="church_id" id="church_id" class="form-control" placeholder="輸入會友編號" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="name">姓名 (必填)</label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="輸入真實姓名" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="mobile1">手機號碼</label>
                    <input type="text" name="mobile1" id="mobile1" class="form-control" placeholder="如 0912345678">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="email1">電子信箱</label>
                    <input type="email" name="email1" id="email1" class="form-control" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="address">聯絡地址</label>
                <input type="text" name="address" id="address" class="form-control" placeholder="輸入完整居住/通訊地址">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="section">所屬牧區</label>
                    <input type="text" name="section" id="section" class="form-control" placeholder="如 二魚牧區、佳美牧區">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="family_id">Family ID (家族編號)</label>
                    <input type="number" name="family_id" id="family_id" class="form-control" placeholder="同一家族會友設定相同ID">
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <a href="{% url 'eureka:eureka' %}" class="btn btn-secondary w-50 py-2 fw-bold">取消</a>
                <button type="submit" class="btn btn-success w-50 py-2 fw-bold shadow-sm">確認新增</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
