<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | 北門行政平台</title>
    <style>
        :root {
            --bg-color: #2F4156;
            --sidebar-bg: #2B3E55;
            --accent-color: #BCDCFF;
            --text-primary: #FFFFFF;
            --text-secondary: #CBD5E1;
            --glass-bg: rgba(43, 62, 85, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-color: rgba(188, 220, 255, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 20% 30%, #3a536e 0%, var(--bg-color) 70%);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.45;
            pointer-events: none;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            top: 15%;
            left: 25%;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            background: #4F709C;
            bottom: 10%;
            right: 20%;
        }

        .login-container {
            width: min(100%, 440px);
            padding: 20px;
            z-index: 10;
            text-align: center;
        }

        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0;
            font-size: 2.05rem;
            font-weight: 800;
            line-height: 1.25;
            color: var(--text-primary);
        }

        .subtitle {
            margin: 10px 0 32px;
            color: var(--text-secondary);
            font-size: 0.98rem;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1rem;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.14);
            border: 1px solid rgba(239, 68, 68, 0.28);
            color: #FCA5A5;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            text-align: left;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: var(--accent-color);
            color: var(--sidebar-bg);
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-login:hover {
            background: #FFF;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(188, 220, 255, 0.35);
        }

        @media (max-width: 480px) {
            body {
                overflow: auto;
            }

            .login-card {
                padding: 34px 24px;
            }

            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>

    <main class="login-container">
        <section class="login-card" aria-labelledby="login-title">
            <h1 id="login-title">歡迎來到北門行政平台</h1>
            <p class="subtitle">請輸入帳號與密碼</p>

            {% if form.errors and not form.non_field_errors %}
                <div class="error-message" role="alert">請確認帳號與密碼是否正確。</div>
            {% endif %}
            {% if form.non_field_errors %}
                <div class="error-message" role="alert">{{ form.non_field_errors }}</div>
            {% endif %}

            <form action="{{ app_path }}" method="post" id="login-form">
                {% csrf_token %}
                <input type="hidden" name="next" value="/">

                <div class="form-group">
                    <label for="id_username">帳號</label>
                    <input type="text" name="username" id="id_username" required autofocus autocapitalize="none" autocomplete="username" placeholder="請輸入帳號">
                </div>

                <div class="form-group">
                    <label for="id_password">密碼</label>
                    <input type="password" name="password" id="id_password" required autocomplete="current-password" placeholder="請輸入密碼">
                </div>

                <button type="submit" class="btn-login">登入</button>
            </form>
        </section>
    </main>
</body>
</html>
