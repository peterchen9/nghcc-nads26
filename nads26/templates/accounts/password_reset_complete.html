<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼已重設 | 北門行政平台</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2F4156;
            --sidebar-bg: #2B3E55;
            --accent-color: #BCDCFF;
            --text-primary: #FFFFFF;
            --text-secondary: #CBD5E1;
            --glass-bg: rgba(43, 62, 85, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 20% 30%, #3a536e 0%, var(--bg-color) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.5;
            pointer-events: none;
        }
        .circle-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            top: 15%;
            left: 25%;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-align: center;
        }

        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 25px;
            display: inline-block;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .card h2 {
            margin: 0 0 15px 0;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #FFF;
        }

        .card p {
            margin: 0 0 30px 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .btn-login {
            display: inline-block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: var(--accent-color);
            color: var(--sidebar-bg);
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-login:hover {
            background: #FFF;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(188, 220, 255, 0.35);
        }
    </style>
</head>
<body>
    <div class="decor-circle circle-1"></div>

    <div class="container">
        <div class="card">
            <div class="success-icon">✨</div>
            <h2>密碼重設成功</h2>
            <p>您的新密碼已設定完成。現在您可以使用新密碼重新登入平台。</p>
            <a href="{% url 'login' %}" class="btn-login">前往登入</a>
        </div>
    </div>
</body>
</html>
