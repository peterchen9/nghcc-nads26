<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 | 北門行政平台</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2F4156;
            --sidebar-bg: #2B3E55;
            --accent-color: #BCDCFF;
            --text-primary: #FFFFFF;
            --text-secondary: #CBD5E1;
            --glass-bg: rgba(43, 62, 85, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glow-color: rgba(188, 220, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 20% 30%, #3a536e 0%, var(--bg-color) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.5;
            pointer-events: none;
        }
        .circle-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            top: 15%;
            left: 25%;
            animation: floatCircle 8s infinite alternate ease-in-out;
        }
        .circle-2 {
            width: 400px;
            height: 400px;
            background: #4F709C;
            bottom: 10%;
            right: 20%;
            animation: floatCircle 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes floatCircle {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #FFF;
        }

        .header p {
            margin: 10px 0 0 0;
            color: var(--text-secondary);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: var(--accent-color);
            color: var(--sidebar-bg);
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            margin-bottom: 15px;
        }

        .btn-submit:hover {
            background: #FFF;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(188, 220, 255, 0.35);
        }

        .links-row {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        .error-list {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #F87171;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            list-style-type: none;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h2>重設密碼</h2>
                <p>請輸入您的電子信箱，系統將會向您發送重設密碼的連結說明。</p>
            </div>

            {% if form.errors %}
                <ul class="error-list">
                    {% for field in form %}
                        {% for error in field.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    {% endfor %}
                    {% for error in form.non_field_errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_email">電子信箱</label>
                    <input type="email" name="email" id="id_email" required 
                           class="form-control" autocomplete="email" placeholder="example@church.org" autofocus>
                </div>

                <button type="submit" class="btn-submit">發送重設說明</button>
            </form>

            <div class="links-row">
                <a href="{% url 'login' %}" class="back-link">返回登入畫面</a>
            </div>
        </div>
    </div>
</body>
</html>
