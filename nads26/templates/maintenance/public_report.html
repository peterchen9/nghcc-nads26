<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教會維護回報</title>
    <style>
        *{box-sizing:border-box} body{margin:0;background:#f3f6f8;color:#172331;font-family:"Microsoft JhengHei",system-ui,sans-serif}.public-wrap{max-width:820px;margin:0 auto;padding:34px 16px}.public-head{margin-bottom:18px}.public-head h1{margin:5px 0 8px;font-size:2rem}.public-head p{margin:0;color:#536474;line-height:1.7}.public-card{background:#fff;border:1px solid #d9e2e8;border-radius:10px;padding:22px;box-shadow:0 2px 9px rgba(30,50,70,.06)}.public-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.public-grid .wide{grid-column:1/-1}label{display:block;font-weight:700;font-size:.92rem}label span{display:block;margin-bottom:6px}.public-field{width:100%;min-height:44px;border:1px solid #c8d3dc;border-radius:6px;padding:9px 11px;background:#fff;font:inherit}textarea.public-field{min-height:130px;resize:vertical}.errors,.errorlist{color:#b42318;margin:5px 0;padding-left:18px}.public-actions{display:flex;justify-content:flex-end;border-top:1px solid #e3e9ed;margin-top:20px;padding-top:18px}.public-btn{border:0;border-radius:7px;background:#17675f;color:#fff;padding:11px 22px;font:inherit;font-weight:700;cursor:pointer}.public-success{border:1px solid #86d5b0;background:#eaf8f1;color:#116344;padding:14px;border-radius:8px;margin-bottom:16px}@media(max-width:650px){.public-wrap{padding:22px 12px}.public-grid{grid-template-columns:1fr}.public-grid .wide{grid-column:auto}.public-card{padding:16px}.public-head h1{font-size:1.55rem}}
    </style>
</head>
<body><main class="public-wrap"><header class="public-head"><strong style="color:#17675f;">教會維護回報</strong><h1>回報需要維護的問題</h1><p>請填寫問題位置與狀況，行政同工收到後會安排後續處理。</p></header>
{% if submitted %}<div class="public-success"><strong>已送出回報</strong><br>謝謝你的提醒，行政同工會在內部維護系統追蹤處理。</div>{% endif %}
<form class="public-card" method="post" enctype="multipart/form-data">{% csrf_token %}{{ form.website }}{% if form.non_field_errors %}{{ form.non_field_errors }}{% endif %}<div class="public-grid">{% for field in form.visible_fields %}<label class="{% if field.name == 'issue' %}wide{% endif %}"><span>{{ field.label }}{% if field.field.required %} *{% endif %}</span>{{ field }}{{ field.errors }}</label>{% endfor %}</div><div class="public-actions"><button class="public-btn" type="submit">送出回報</button></div></form>
</main></body></html>
