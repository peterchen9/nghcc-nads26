{% extends "base.html" %}

{% block title %}場地登記 - {{ site_name }}{% endblock %}


{% block topbar_user_profile %}{% endblock %}

{% block extra_css %}
<style>
    .content-area {
        padding: 0;
        overflow: hidden;
    }
    .mrbs-frame-wrap {
        height: calc(100vh - 70px);
        min-height: 680px;
        background: #ffffff;
    }
    .mrbs-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #ffffff;
    }
</style>
{% endblock %}

{% block content %}
<div class="mrbs-frame-wrap">
    <iframe class="mrbs-frame" src="{{ mrbs_url }}" title="場地登記"></iframe>
</div>
{% endblock %}
